<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" />
    <title>free-torrent-cli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Variables ─────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #18181f;
            --border: #222230;
            --border2: #2a2a3a;
            --accent: #00e5ff;
            --accent2: #7b61ff;
            --accent3: #00ff88;
            --warn: #ff6b35;
            --text: #e8e8f0;
            --text2: #8888aa;
            --text3: #444466;
            --radius: 6px;
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Layout ────────────────────────────────────────────────────────────── */
        .app {
            display: grid;
            grid-template-rows: 52px 1fr;
            height: 100vh;
        }

        /* ── Titlebar ───────────────────────────────────────────────────────────── */
        .titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 0 80px;
            /* 80px left for macOS traffic lights */
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            position: relative;
            z-index: 10;
        }

        .titlebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .titlebar-logo {
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .titlebar-logo::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .titlebar-name {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--text2);
            text-transform: uppercase;
        }

        .titlebar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--bg3);
            color: var(--text2);
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            -webkit-app-region: no-drag;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 229, 255, 0.05);
        }

        .btn-primary {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 229, 255, 0.08);
        }

        .btn-primary:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.2);
        }

        .btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* ── Main content ───────────────────────────────────────────────────────── */
        .main {
            display: grid;
            grid-template-columns: 240px 1fr;
            overflow: hidden;
        }

        /* ── Sidebar ────────────────────────────────────────────────────────────── */
        .sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 16px 12px 8px;
        }

        .sidebar-label {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--text3);
            text-transform: uppercase;
            padding: 0 4px;
            margin-bottom: 6px;
        }

        .sidebar-stat {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 4px;
            border-radius: var(--radius);
        }

        .sidebar-stat-label {
            font-size: 11px;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-stat-label svg {
            width: 10px;
            height: 10px;
            fill: var(--text3);
        }

        .sidebar-stat-value {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text);
        }

        .sidebar-stat-value.accent {
            color: var(--accent);
        }

        .sidebar-stat-value.accent2 {
            color: var(--accent2);
        }

        .sidebar-stat-value.accent3 {
            color: var(--accent3);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 12px;
        }

        .savepath-row {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .savepath-value {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text3);
            word-break: break-all;
            line-height: 1.5;
        }

        .savepath-btn {
            margin-top: 4px;
            width: 100%;
            justify-content: center;
        }

        /* ── Torrent list ───────────────────────────────────────────────────────── */
        .torrent-list-wrap {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* ── Empty state ────────────────────────────────────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
            color: var(--text3);
            position: relative;
            overflow: hidden;
        }

        .empty-state::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .empty-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.3;
            mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black, transparent);
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            border: 1.5px solid var(--border2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .empty-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--text3);
        }

        .empty-title {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.05em;
            position: relative;
            z-index: 1;
        }

        .empty-sub {
            font-size: 12px;
            color: var(--text3);
            text-align: center;
            line-height: 1.6;
            max-width: 260px;
            position: relative;
            z-index: 1;
        }

        /* ── Drop overlay ───────────────────────────────────────────────────────── */
        .drop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 229, 255, 0.05);
            border: 2px dashed var(--accent);
            border-radius: 8px;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 0.1em;
            pointer-events: none;
        }

        .drop-overlay.active {
            display: flex;
        }

        /* ── Torrent list ───────────────────────────────────────────────────────── */
        .torrent-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .torrent-list::-webkit-scrollbar {
            width: 4px;
        }

        .torrent-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .torrent-list::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        /* ── Torrent card ───────────────────────────────────────────────────────── */
        .torrent-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .torrent-card:hover {
            border-color: var(--border2);
            background: var(--bg3);
        }

        .torrent-card.selected {
            border-color: var(--accent2);
        }

        .torrent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent2), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .torrent-card.selected::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .card-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
            word-break: break-all;
            flex: 1;
        }

        .card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid transparent;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text3);
            transition: all 0.15s ease;
        }

        .icon-btn:hover {
            border-color: var(--border2);
            color: var(--text2);
            background: var(--bg3);
        }

        .icon-btn.danger:hover {
            border-color: var(--warn);
            color: var(--warn);
        }

        .icon-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* ── Progress bar ───────────────────────────────────────────────────────── */
        .card-progress-wrap {
            margin-bottom: 10px;
            position: relative;
        }

        .card-progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .card-progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.5s ease;
            position: relative;
        }

        .card-progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3));
        }

        .card-progress-fill.seeding {
            background: linear-gradient(90deg, var(--accent3), rgba(0, 255, 136, 0.5));
        }

        .card-progress-fill.error {
            background: var(--warn);
        }

        /* ── Card meta row ──────────────────────────────────────────────────────── */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
        }

        .meta-item svg {
            width: 9px;
            height: 9px;
            fill: currentColor;
        }

        .meta-item.down {
            color: var(--accent);
        }

        .meta-item.up {
            color: var(--accent3);
        }

        .meta-item.warn {
            color: var(--warn);
        }

        /* ── Status badge ───────────────────────────────────────────────────────── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7px;
            border-radius: 20px;
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid;
        }

        .status-badge.checking {
            color: var(--text2);
            border-color: var(--border2);
            background: var(--bg3);
        }

        .status-badge.downloading {
            color: var(--accent);
            border-color: rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.06);
        }

        .status-badge.seeding {
            color: var(--accent3);
            border-color: rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.06);
        }

        .status-badge.error {
            color: var(--warn);
            border-color: rgba(255, 107, 53, 0.3);
            background: rgba(255, 107, 53, 0.06);
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.downloading .status-dot,
        .status-badge.seeding .status-dot {
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Detail panel ───────────────────────────────────────────────────────── */
        .detail-panel {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            background: var(--bg);
            display: none;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .detail-panel.visible {
            display: flex;
        }

        .detail-files-label {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 4px;
        }

        .detail-file {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
            gap: 8px;
        }

        .detail-file:last-child {
            border-bottom: none;
        }

        .detail-file-name {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text2);
            word-break: break-all;
            flex: 1;
        }

        .detail-file-size {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            flex-shrink: 0;
        }

        /* ── Notification toast ─────────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 16px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text);
            z-index: 200;
            transform: translateY(60px);
            opacity: 0;
            transition: all 0.25s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: rgba(0, 255, 136, 0.4);
            color: var(--accent3);
        }

        .toast.error {
            border-color: rgba(255, 107, 53, 0.4);
            color: var(--warn);
        }
    </style>
</head>

<body>

    <div class="drop-overlay" id="dropOverlay">DROP TORRENT FILES TO ADD</div>
    <div class="toast" id="toast"></div>

    <div class="app">

        <!-- Titlebar -->
        <header class="titlebar">
            <div class="titlebar-brand">
                <div class="titlebar-logo"></div>
                <span class="titlebar-name">free-torrent-cli</span>
            </div>
            <div class="titlebar-actions">
                <button class="btn" id="btnChangeSavePath">
                    <svg viewBox="0 0 16 16">
                        <path
                            d="M1 3.5A1.5 1.5 0 012.5 2h3.764c.958 0 1.76.56 2.09 1.328L8.5 4H13.5A1.5 1.5 0 0115 5.5v7A1.5 1.5 0 0113.5 14h-11A1.5 1.5 0 011 12.5v-9z" />
                    </svg>
                    Save Path
                </button>
                <button class="btn btn-primary" id="btnAdd">
                    <svg viewBox="0 0 16 16">
                        <path
                            d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z" />
                    </svg>
                    Add Torrent
                </button>
            </div>
        </header>

        <!-- Main -->
        <div class="main">

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-label">Session</div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label">
                            <svg viewBox="0 0 16 16">
                                <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 1.5a5.5 5.5 0 110 11 5.5 5.5 0 010-11z" />
                            </svg>
                            Active
                        </span>
                        <span class="sidebar-stat-value accent" id="statActive">0</span>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label">
                            <svg viewBox="0 0 16 16">
                                <path
                                    d="M8 14A6 6 0 108 2a6 6 0 000 12zm0-8a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 018 6zm0-2.5a1 1 0 110 2 1 1 0 010-2z" />
                            </svg>
                            Seeding
                        </span>
                        <span class="sidebar-stat-value accent3" id="statSeeding">0</span>
                    </div>
                </div>

                <div class="sidebar-divider"></div>

                <div class="sidebar-section">
                    <div class="sidebar-label">Transfer</div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label">↓ Download</span>
                        <span class="sidebar-stat-value accent" id="statDown">0 B/s</span>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-label">↑ Upload</span>
                        <span class="sidebar-stat-value accent3" id="statUp">0 B/s</span>
                    </div>
                </div>

                <div class="sidebar-divider"></div>

                <div class="savepath-row">
                    <div class="sidebar-label">Save Location</div>
                    <div class="savepath-value" id="savePathDisplay">~/Downloads</div>
                    <button class="btn savepath-btn" id="btnChangeSavePath2">Change</button>
                </div>
            </aside>

            <!-- Torrent list -->
            <div class="torrent-list-wrap">

                <!-- Empty state -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-grid"></div>
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" />
                        </svg>
                    </div>
                    <div class="empty-title">No torrents yet</div>
                    <div class="empty-sub">Click "Add Torrent" or drop .torrent files anywhere to start downloading
                    </div>
                    <button class="btn btn-primary" id="btnAddEmpty">
                        <svg viewBox="0 0 16 16" style="width:12px;height:12px;fill:currentColor">
                            <path
                                d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z" />
                        </svg>
                        Add Torrent
                    </button>
                </div>

                <!-- Active list -->
                <div class="torrent-list" id="torrentList" style="display:none"></div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
